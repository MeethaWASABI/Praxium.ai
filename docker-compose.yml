version: '3.8'

services:
  # Vite React Frontend
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    networks:
      - praxium-network
    restart: unless-stopped

  # Express Backend
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    command: sh -c "npx prisma generate && npx prisma db push --accept-data-loss && node seed.js && node index.js"
    ports:
      - "3001:3000"
    environment:
      - NODE_ENV=production
      # Connecting directly using the praxium-network
      - REDIS_URL=redis://redis:6379
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - DATABASE_URL=postgresql://praxium_user:reena2636@postgres:5432/praxium?schema=public
    networks:
      - praxium-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  # Prisma Studio for Database Management
  prisma-studio:
    build:
      context: ./server
      dockerfile: Dockerfile
    command: sh -c "npx prisma generate && HOST=0.0.0.0 npx prisma studio --browser none --port 5555"
    ports:
      - "5555:5555"
    environment:
      - DATABASE_URL=postgresql://praxium_user:reena2636@postgres:5432/praxium?schema=public
    networks:
      - praxium-network
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  # Nginx Reverse Proxy
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    ports:
      - "80:80"
    networks:
      - praxium-network
    depends_on:
      - frontend
      - backend
    restart: unless-stopped

  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    env_file:
      - .env
    environment:
      POSTGRES_HOST_AUTH_METHOD: trust
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - praxium-network
    ports:
      - "5433:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Redis Cache
  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD:-redispassword}
    networks:
      - praxium-network
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # PgAdmin (Database Management UI)
  pgadmin:
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-your_email}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-your_password}
    ports:
      - "5050:80"
    networks:
      - praxium-network
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - pgadmin_data:/var/lib/pgadmin

networks:
  praxium-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  pgadmin_data:
    driver: local
